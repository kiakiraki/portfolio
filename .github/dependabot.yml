version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    groups:
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      dev-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "wrangler"
          - "@cloudflare/*"
